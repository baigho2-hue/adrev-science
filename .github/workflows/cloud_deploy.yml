name: CI/CD Build & Cloud Deploy

on:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build_macos:
    name: Build macOS DMG (Universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install MAUI Workload
        run: dotnet workload install maui-maccatalyst

      - name: Restore dependencies
        run: dotnet restore AdRev.sln -p:TargetFramework=net9.0-maccatalyst

      - name: Build and Publish MacCatalyst (Universal)
        run: |
          dotnet publish AdRev.Mobile/AdRev.Mobile.csproj -f net9.0-maccatalyst -c Release -p:CreatePackage=true -o bin/publish/mac --self-contained true

          
      - name: Create DMG
        run: |
          mkdir -p bin/publish/dmg
          cp -R "bin/publish/mac/AdRev Collect.app" bin/publish/dmg/
          hdiutil create -volname "AdRev Collect" -srcfolder bin/publish/dmg -ov -format UDZO AdRev_Collect_Universal.dmg

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdRev-Collect-macOS-DMG
          path: AdRev_Collect_Universal.dmg

  build_windows:
    name: Build Windows App (WPF)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore AdRev.Desktop/AdRev.Desktop.csproj

      - name: Build Windows Desktop
        run: |
          dotnet publish AdRev.Desktop/AdRev.Desktop.csproj -f net9.0-windows -c Release -r win-x64 --self-contained true -o bin/publish/win
          
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdRev-Desktop-Windows
          path: bin/publish/win/AdRev.Desktop.exe

  create_release:
    name: Create GitHub Release
    needs: [build_macos, build_windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: AdRev-Collect-macOS-DMG
          path: .
          
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: AdRev-Desktop-Windows
          path: .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AdRev_Collect_Universal.dmg
            AdRev.Desktop.exe
          body: "Release officielle AdRev Science Suite 2.0.4 - DMG Universel (macOS) et EXE (Windows)."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
